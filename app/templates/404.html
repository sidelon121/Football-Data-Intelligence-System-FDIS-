{% extends "base.html" %}
{% block title %}Not Found{% endblock %}
{% block header_title %}404{% endblock %}

{% block content %}
<div class="card">
    <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <h3>Page Not Found</h3>
        <p>The page you're looking for doesn't exist or the data hasn't been loaded yet.</p>
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
